name: smart_cleaner_pro
description: Smart Cleaner Pro - Real storage cleaner for Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Charts
  fl_chart: ^0.68.0

  # Ads
  google_mobile_ads: ^5.1.0

  # Permissions
  permission_handler: ^11.3.1

  # UI
  shimmer: ^3.0.0

  # Utils
  crypto: ^3.0.3
  path: ^1.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # NOTE: lottie/ asset folder removed — directory didn't exist and caused
  # a fatal "Unable to load asset" crash on startup.
  # Add it back only when actual .json files are placed in assets/lottie/
